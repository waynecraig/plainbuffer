name: Publish Package to npmjs
on:
  release:
    types: [published]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          # Trusted publishing (OIDC) requires Node >= 22.14 and npm >= 11.5.1
          # https://docs.npmjs.com/trusted-publishers
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Use npm CLI with OIDC trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm run test

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      # Provenance is automatic when publishing via trusted publishing (OIDC)
      - name: Publish to npm (OIDC)
        run: npm publish --access public
